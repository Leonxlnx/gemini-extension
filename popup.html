<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini UI Redesign</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <header class="popup-header">
            <div class="logo-row">
                <img class="logo-icon" src="icon.svg" alt="Gemini" width="22" height="22">
                <h1>Gemini UI</h1>
                <span class="version-badge">v0.2.17</span>
            </div>
            <p class="subtitle">Customize your Gemini experience</p>
        </header>

        <!-- Master Toggle -->
        <div class="toggle-row">
            <span class="toggle-label">Custom Backgrounds</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-backgrounds" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- Hide Upgrade Button Toggle -->
        <div class="toggle-row">
            <span class="toggle-label">Hide Upgrade Button</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-hide-upgrade">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- Glass & Glow Settings -->
        <div class="fx-section">
            <div class="fx-section-title">Glass & Glow</div>

            <div class="fx-slider-row">
                <span class="fx-label">Glass</span>
                <input type="range" id="glass-intensity" min="0" max="100" value="0" step="5">
                <span class="fx-value" id="glass-intensity-value">0%</span>
            </div>

            <div class="fx-slider-row" id="glass-blur-row">
                <span class="fx-label">Blur</span>
                <input type="range" id="glass-blur-slider" min="0" max="40" value="24" step="2">
                <span class="fx-value" id="glass-blur-value">24px</span>
            </div>

            <div class="fx-divider"></div>

            <div class="fx-slider-row">
                <span class="fx-label">Glow</span>
                <input type="range" id="glow-intensity" min="0" max="100" value="0" step="5">
                <span class="fx-value" id="glow-intensity-value">0%</span>
            </div>

            <div class="fx-color-row" id="glow-color-row">
                <span class="fx-label">Color</span>
                <div class="color-presets" id="glow-presets">
                    <button class="color-dot active" data-color="#a855f7" style="background:#a855f7" title="Purple"></button>
                    <button class="color-dot" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></button>
                    <button class="color-dot" data-color="#06b6d4" style="background:#06b6d4" title="Cyan"></button>
                    <button class="color-dot" data-color="#f97316" style="background:#f97316" title="Orange"></button>
                    <button class="color-dot" data-color="#ef4444" style="background:#ef4444" title="Red"></button>
                    <button class="color-dot" data-color="#10b981" style="background:#10b981" title="Green"></button>
                    <button class="color-dot" data-color="#f5f5f5" style="background:#f5f5f5" title="White"></button>
                </div>
                <input type="color" id="glow-color-custom" value="#a855f7" class="color-custom" title="Custom color">
            </div>
        </div>

        <!-- Drop Zones with individual darkness sliders -->
        <div class="zones-container" id="zones-container">

            <!-- Background Zone -->
            <div class="zone-group">
                <div class="drop-zone" data-key="bg_custom" id="zone-bg">
                    <div class="zone-preview" id="preview-bg"></div>
                    <div class="zone-overlay">
                        <svg class="upload-icon" viewBox="0 0 24 24" width="18" height="18" fill="none"
                            stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                        </svg>
                        <span class="zone-label">Background</span>
                    </div>
                    <button class="zone-reset" title="Reset to default">✕</button>
                    <input type="file" accept="image/*" class="zone-input">
                </div>
                <div class="zone-slider">
                    <span class="zone-slider-label">DK</span>
                    <input type="range" class="darkness-slider" data-target="darkness_bg" min="0" max="100" value="60"
                        step="5">
                    <span class="zone-slider-value">60%</span>
                </div>
            </div>

            <!-- Sidebar Zone -->
            <div class="zone-group">
                <div class="drop-zone" data-key="sidebar_custom" id="zone-sidebar">
                    <div class="zone-preview" id="preview-sidebar"></div>
                    <div class="zone-overlay">
                        <svg class="upload-icon" viewBox="0 0 24 24" width="18" height="18" fill="none"
                            stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                        </svg>
                        <span class="zone-label">Sidebar</span>
                    </div>
                    <button class="zone-reset" title="Reset to default">✕</button>
                    <input type="file" accept="image/*" class="zone-input">
                </div>
                <div class="zone-slider">
                    <span class="zone-slider-label">DK</span>
                    <input type="range" class="darkness-slider" data-target="darkness_sidebar" min="0" max="100"
                        value="60" step="5">
                    <span class="zone-slider-value">60%</span>
                </div>
            </div>

            <!-- Input Zone -->
            <div class="zone-group">
                <div class="drop-zone" data-key="input_custom" id="zone-input">
                    <div class="zone-preview" id="preview-input"></div>
                    <div class="zone-overlay">
                        <svg class="upload-icon" viewBox="0 0 24 24" width="18" height="18" fill="none"
                            stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                        </svg>
                        <span class="zone-label">Input Field</span>
                    </div>
                    <button class="zone-reset" title="Reset to default">✕</button>
                    <input type="file" accept="image/*" class="zone-input">
                </div>
                <div class="zone-slider">
                    <span class="zone-slider-label">DK</span>
                    <input type="range" class="darkness-slider" data-target="darkness_input" min="0" max="100"
                        value="60" step="5">
                    <span class="zone-slider-value">60%</span>
                </div>
            </div>

            <!-- Messages Zone -->
            <div class="zone-group">
                <div class="drop-zone" data-key="msg_custom" id="zone-msg">
                    <div class="zone-preview" id="preview-msg"></div>
                    <div class="zone-overlay">
                        <svg class="upload-icon" viewBox="0 0 24 24" width="18" height="18" fill="none"
                            stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                        </svg>
                        <span class="zone-label">Messages</span>
                    </div>
                    <button class="zone-reset" title="Reset to default">✕</button>
                    <input type="file" accept="image/*" class="zone-input">
                </div>
                <div class="zone-slider">
                    <span class="zone-slider-label">DK</span>
                    <input type="range" class="darkness-slider" data-target="darkness_msg" min="0" max="100" value="60"
                        step="5">
                    <span class="zone-slider-value">60%</span>
                </div>
            </div>
        </div>

        <footer class="popup-footer">
            <span>Drop images or click to upload</span>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
